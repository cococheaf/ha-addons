name: OpenPool
version: "1.1.6"
slug: openpool
description: OpenSource Pool System Controller currently designed for Intex 26680 based pump/chlorinator systems, heat pumps and PV surplus control.
url: https://github.com/cococheaf/ha-addons
arch:
  - armhf
  - aarch64
  - amd64
  - i386
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:pool
panel_title: OpenPool
panel_admin: false
webui: http://[HOST]:[PORT:8099]/
homeassistant_api: true
hassio_api: true
hassio_role: default
ports:
  8099/tcp: null
ports_description:
  8099/tcp: OpenPool web interface
watchdog: http://[HOST]:[PORT:8099]/healthz
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
  poll_interval_s: 1
  connection:
    auth_mode: supervisor
    homeassistant_url: http://homeassistant:8123
    access_token: ""
  features:
    heat_pump_control: true
    weather_control: true
  entities:
    pump_switch: switch.poolpumpe
    heater_climate: climate.poolheizung
    heater_operation_mode: select.poolheizung_betriebsmodus
    weather: weather.home
    pv_generation: sensor.pv_erzeugungsleistung
    pv_export: sensor.stromzahler_active_power_minus
    grid_import: sensor.stromzahler_active_power_plus
    pump_power: sensor.poolpumpe_leistung
    pump_current: sensor.poolpumpe_current
    pump_voltage: sensor.poolpumpe_spannung
    pump_signal: sensor.poolpumpe_signal
    heater_power: sensor.poolheizung_leistung
    heater_current: sensor.poolheizung_netzstrom
    heater_voltage: sensor.poolheizung_netzspannung
    heater_fan: sensor.poolheizung_lufter
    heater_ambient: sensor.poolheizung_umgebungsluft_temperatur
    heater_water_in: sensor.poolheizung_wassertemperatur_eingang
    heater_water_out: sensor.poolheizung_wassertemperatur_ausgang
  thresholds:
    pv_start_export_w: 1500
    pv_stop_export_w: 1500
    pv_start_stable_minutes: 5
    pv_stop_stable_minutes: 1
    heater_temp_min: 18
    heater_temp_max: 32
    pump_power_without_chlorinator_w: 450
    pump_power_with_chlorinator_w: 500
  profiles:
    pump_start: "07:30"
    pump_end: "22:00"
    bad_weather_start: "13:00"
    bad_weather_end: "16:15"
    night_swim_duration_hours: 10
  restart_pulses:
    pulse_1:
      enabled: true
      time: "11:59"
      duration_s: 5
    pulse_2:
      enabled: true
      time: "16:59"
      duration_s: 5
    pulse_3:
      enabled: true
      time: "23:59"
      duration_s: 5
    pulse_4:
      enabled: false
      time: "00:00"
      duration_s: 5
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  poll_interval_s: int
  connection:
    auth_mode: list(supervisor|openpool_user_token)
    homeassistant_url: str
    access_token: password
  features:
    heat_pump_control: bool
    weather_control: bool
  entities:
    pump_switch: str
    heater_climate: str
    heater_operation_mode: str
    weather: str
    pv_generation: str
    pv_export: str
    grid_import: str
    pump_power: str
    pump_current: str
    pump_voltage: str
    pump_signal: str
    heater_power: str
    heater_current: str
    heater_voltage: str
    heater_fan: str
    heater_ambient: str
    heater_water_in: str
    heater_water_out: str
  thresholds:
    pv_start_export_w: int
    pv_stop_export_w: int
    pv_start_stable_minutes: float
    pv_stop_stable_minutes: float
    heater_temp_min: float
    heater_temp_max: float
    pump_power_without_chlorinator_w: int
    pump_power_with_chlorinator_w: int
  profiles:
    pump_start: str
    pump_end: str
    bad_weather_start: str
    bad_weather_end: str
    night_swim_duration_hours: float
  restart_pulses:
    pulse_1:
      enabled: bool
      time: str
      duration_s: int
    pulse_2:
      enabled: bool
      time: str
      duration_s: int
    pulse_3:
      enabled: bool
      time: str
      duration_s: int
    pulse_4:
      enabled: bool
      time: str
      duration_s: int
